<rect width="100%" height="100%" fill="#f8fafc"/>
<text x="610.0" y="34.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="700" fill="#1f2937">Metric explainer: what each number means</text>
<rect x="42.0" y="78.0" width="250.0" height="158.0" rx="12" fill="#dbeafe" stroke="#94a3b8" stroke-width="1.2"/>
<text x="167.0" y="112.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="700" fill="#1f2937">MAE</text>
<text x="167.0" y="146.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="500" fill="#334155">mean |pred - true|</text>
<text x="167.0" y="176.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="400" fill="#475569">EV / LA / xBA</text>
<text x="167.0" y="206.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="700" fill="#0f172a">smaller is better</text>
<rect x="330.0" y="78.0" width="250.0" height="158.0" rx="12" fill="#dcfce7" stroke="#94a3b8" stroke-width="1.2"/>
<text x="455.0" y="112.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="700" fill="#1f2937">Brier</text>
<text x="455.0" y="146.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="500" fill="#334155">mean (prob - label)^2</text>
<text x="455.0" y="176.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="400" fill="#475569">hard-hit / barrel</text>
<text x="455.0" y="206.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="700" fill="#0f172a">smaller is better</text>
<rect x="618.0" y="78.0" width="250.0" height="158.0" rx="12" fill="#fef3c7" stroke="#94a3b8" stroke-width="1.2"/>
<text x="743.0" y="112.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="700" fill="#1f2937">Spearman rho</text>
<text x="743.0" y="146.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="500" fill="#334155">corr(rank true, rank pred)</text>
<text x="743.0" y="176.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="400" fill="#475569">player ranking</text>
<text x="743.0" y="206.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="700" fill="#0f172a">-1 to +1; larger is better</text>
<rect x="906.0" y="78.0" width="250.0" height="158.0" rx="12" fill="#fee2e2" stroke="#94a3b8" stroke-width="1.2"/>
<text x="1031.0" y="112.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="700" fill="#1f2937">n</text>
<text x="1031.0" y="146.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="500" fill="#334155">usable rows for metric</text>
<text x="1031.0" y="176.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="400" fill="#475569">coverage / reliability</text>
<text x="1031.0" y="206.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="700" fill="#0f172a">larger is safer</text>
<text x="610.0" y="296.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#334155">Spearman example: rho=0.9 means the model almost preserves player ordering; rho=0 means ordering is mostly unrelated.</text>
